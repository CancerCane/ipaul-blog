<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-top">
      <div class="footer-brand">
        <a href="{{ '/' | relative_url }}">iPaul<span class="brand-accent">Blog</span></a>
        <p class="footer-tagline">{{ site.tagline }}</p>
      </div>

      <nav class="footer-nav">
        {% for item in site.data.navigation.main %}
          <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
      </nav>

      <div class="footer-social">
        {% if site.social.github %}
          <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fab fa-github"></i>
          </a>
        {% endif %}
        {% if site.social.twitter %}
          <a href="https://twitter.com/{{ site.social.twitter }}" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
            <i class="fab fa-twitter"></i>
          </a>
        {% endif %}
        {% if site.social.instagram %}
          <a href="https://instagram.com/{{ site.social.instagram }}" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
        {% endif %}
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    </div>
  </div>
</footer>
